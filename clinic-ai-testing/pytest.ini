[pytest]
testpaths = tests
addopts =
    -ra
    --strict-markers
    --html=reports/pytest_report.html
    --self-contained-html
    --junitxml=reports/junit.xml
markers =
    agent: agent routing, tool-use, and response-quality tests
    rag: retrieval and generation-quality tests
    safety: safety, bias, and harmful-output tests
